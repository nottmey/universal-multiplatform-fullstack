# Extends the built-in rules shipped with the installed gitleaks binary.
# https://github.com/gitleaks/gitleaks/blob/master/config/gitleaks.toml

[extend]
useDefault = true

# FlutterFire / Firebase client config: public API keys restricted by Firebase rules.
[allowlist]
paths = [
  '''frontend/lib/firebase/firebase_options\.dart''',
  '''frontend/android/app/google-services\.json''',
  '''frontend/ios/Runner/GoogleService-Info\.plist''',
]
