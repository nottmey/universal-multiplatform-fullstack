syntax = "proto3";

package social.example.features.likes.grpc;

option java_package = "social.example.features.likes.grpc";
option java_outer_classname = "LikesApiProto";
option java_multiple_files = true;

service LikesService {
  rpc Like (LikeRequest) returns (LikeResponse);
}

message LikeRequest {
  string post_id = 1;
}

message LikeResponse {
  string post_id = 1;
  int64 like_count = 2;
}

message SubscribeLikesResponse {
  string post_id = 1;
  int64 like_count = 2;
}

message SubscribeLikesRequest {
  string post_id = 1;
}
