syntax = "proto3";

package social.example.eventbus.grpc;

option java_package = "social.example.eventbus.grpc";
option java_outer_classname = "EventBusProto";
option java_multiple_files = true;

import "google/protobuf/empty.proto";
import "timeline.proto";
import "likes.proto";
import "posts.proto";

service EventBusService {
  rpc EventBus (EventBusRequest) returns (stream Event);
  rpc Subscribe (SubscribeRequest) returns (google.protobuf.Empty);
  rpc Unsubscribe (UnsubscribeRequest) returns (google.protobuf.Empty);
}

message ConnectionContext {
  string id = 1;
  int64 epoch = 2;
}

message EventBusRequest {
  ConnectionContext context = 1;
}

message SubscribeRequest {
  ConnectionContext context = 1;
  Subscription subscription = 2;
}

message Subscription {
  string subscription_id = 1;
  oneof request {
    // skipping 2, to align numbering with Event.response
    social.example.features.timeline.grpc.SubscribeTimelineRequest timeline = 3;
    social.example.features.posts.grpc.SubscribePostRequest post = 4;
    social.example.features.likes.grpc.SubscribeLikesRequest likes = 5;
  }
}

// Emitted once when the server has registered the EventBus session.
message ConnectionReady {}

message Event {
  string subscription_id = 1;
  oneof response {
    ConnectionReady connection_ready = 2;
    social.example.features.timeline.grpc.SubscribeTimelineResponse timeline = 3;
    social.example.features.posts.grpc.SubscribePostResponse post = 4;
    social.example.features.likes.grpc.SubscribeLikesResponse likes = 5;
  }
}

message UnsubscribeRequest {
  ConnectionContext context = 1;
  string subscription_id = 2;
}
