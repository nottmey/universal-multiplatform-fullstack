syntax = "proto3";

package social.example.features.posts.grpc;

option java_package = "social.example.features.posts.grpc";
option java_outer_classname = "PostsApiProto";
option java_multiple_files = true;

service PostService {
  rpc CreatePost (CreatePostRequest) returns (CreatePostResponse);
  rpc EditPost (EditPostRequest) returns (EditPostResponse);
  rpc DeletePost (DeletePostRequest) returns (DeletePostResponse);
}

message Post {
  string post_id = 1;
  string body = 2;
  int64 posted_at_millis = 3;
}

message CreatePostRequest {
  string body = 1;
}

message CreatePostResponse {
  Post post = 1;
}

message EditPostRequest {
  string post_id = 1;
  string body = 2;
}

message EditPostResponse {
  Post post = 1;
}

message DeletePostRequest {
  string post_id = 1;
}

message DeletePostResponse {}

message SubscribePostRequest {
  string post_id = 1;
}

message SubscribePostResponse {
  Post post = 1;
}
