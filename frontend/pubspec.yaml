name: frontend
description: Timeline REST + WebSocket client (iOS, Android, Web).
publish_to: "none"

version: 0.1.0+1

environment:
  sdk: ">=3.11.1 <4.0.0"
  flutter: ">=3.41.0 <3.42.0"

dependencies:
  flutter:
    sdk: flutter
  client:
    path: ../client
  cupertino_icons: ^1.0.9
  http: ^1.6.0
  uuid: ^4.5.3
  flutter_riverpod: ^3.3.1
  async: ^2.13.1
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  web_socket_channel: ^3.0.0

dev_dependencies:
  fake_async: ^1.3.3
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  mocktail: ^1.0.5
  mockito: ^5.5.0
  patrol: ^4.6.0
  space_gen: ^1.2.2

patrol:
  app_name: Social Example
  android:
    package_name: example.social
  ios:
    bundle_id: example.social

flutter:
  uses-material-design: true
